<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T-0</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="console">

  <div id="padView">
    <canvas id="padCanvas" width="320" height="200"></canvas>
    <div id="scanlines"></div>
  </div>

  <div id="panel">

    <div id="idBlock">
      <div id="idTitle">LAUNCH DIRECTOR CONSOLE</div>
      <div class="idLine">MISSION: <span class="idVal">TEST VEHICLE</span></div>
      <div class="idLine">STATUS:&nbsp; <span id="statusValue" class="idVal">STANDING BY</span></div>
    </div>

    <div id="clockRow">
      <span id="clockLabel">COUNTDOWN</span>
      <span id="clockField"><span id="clockPrefix">T-</span><span id="clockValue">120</span></span>
    </div>

    <div id="activeRow">
      ACTIVE DECISION: <span id="activeDecisionValue">NONE</span>
    </div>

    <div id="systemsBoard">
      <div class="sysTitle">MISSION SYSTEMS</div>
      <div class="sysRow"><span class="sysName">GROUND</span><span class="sysDots"></span><span class="sysStat" data-sys="ground">GO</span></div>
      <div class="sysRow"><span class="sysName">PROPULSION</span><span class="sysDots"></span><span class="sysStat" data-sys="propulsion">GO</span></div>
      <div class="sysRow"><span class="sysName">GUIDANCE</span><span class="sysDots"></span><span class="sysStat" data-sys="guidance">GO</span></div>
      <div class="sysRow"><span class="sysName">WEATHER</span><span class="sysDots"></span><span class="sysStat" data-sys="weather">GO</span></div>
      <div class="sysRow"><span class="sysName">COMMS</span><span class="sysDots"></span><span class="sysStat" data-sys="comms">GO</span></div>
    </div>

    <div id="log"></div>

    <div id="decision" class="hidden">
      <div id="decisionTitle">--</div>
      <div id="decisionBody">--</div>
      <div id="decisionButtons"></div>
    </div>

    <div id="controls">
      <button id="btnHold">HOLD</button>
      <button id="btnAbort" class="dangerBtn">ABORT</button>
    </div>

    <div id="endScreen" class="hidden">
      <div id="endTitle">-- </div>
      <div id="endStats"></div>
      <button id="btnRestart">RESET</button>
    </div>

  </div>

</div>

<script src="src/countdown.js"></script>
<script src="src/comms.js"></script>
<script src="src/events.js"></script>
<script src="src/rocket.js"></script>
<script src="src/ui.js"></script>
<script src="src/input.js"></script>
<script src="src/main.js"></script>
</body>
</html>
